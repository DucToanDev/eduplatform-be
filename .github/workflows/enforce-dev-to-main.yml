name: Enforce Dev to Main Merge
on:
  pull_request:
    branches:
      - main

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check if source branch is dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ ERROR: Bạn chỉ được phép gộp code từ nhánh 'dev' vào 'main'!"
            echo "Nhánh hiện tại đang yêu cầu gộp: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Hợp lệ: Đang gộp từ nhánh dev vào main."
